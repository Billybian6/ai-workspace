<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>历史分时研究</title>
<style>
:root{
  --bg:#f5f7fb;
  --panel:#fff;
  --panel-soft:#f9fbff;
  --text:#172033;
  --muted:#667085;
  --line:#d9e1ee;
  --blue:#2563eb;
  --cyan:#0891b2;
  --green:#169b62;
  --amber:#b7791f;
  --red:#cf3f3f;
  --shadow:0 8px 24px rgba(16,24,40,.08);
}
*{box-sizing:border-box}
body{
  margin:0;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.5;overflow-x:hidden
}
.app{width:100%;max-width:1600px;margin:0 auto;padding:20px}
.topbar{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;padding:18px 0 16px;border-bottom:1px solid var(--line);margin-bottom:18px}
.title h1{font-size:24px;margin:0 0 4px;font-weight:760;letter-spacing:0}
.title p{margin:0;color:var(--muted);font-size:13px}
.meta{display:flex;flex-wrap:wrap;gap:8px;justify-content:flex-end}
.chip{border:1px solid var(--line);background:var(--panel);border-radius:999px;padding:6px 10px;font-size:12px;color:var(--muted)}
.chip a{color:var(--blue);text-decoration:none}
.section{margin-bottom:18px}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow);padding:16px;min-width:0}
.panel h2,.panel h3{font-size:15px;margin:0 0 12px;font-weight:720}
.controls{display:grid;grid-template-columns:1.2fr 1fr 1fr auto auto;gap:10px;align-items:end}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px}
.select,.input,.btn{
  width:100%;border:1px solid var(--line);background:#fff;border-radius:7px;color:var(--text);
  padding:8px 10px;font-size:13px;outline:none;text-decoration:none
}
.btn{display:inline-flex;align-items:center;justify-content:center;cursor:pointer;background:var(--panel-soft);white-space:nowrap}
.btn.primary{background:var(--blue);border-color:var(--blue);color:#fff}
.summary-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:10px}
.stat{border:1px solid var(--line);background:var(--panel-soft);border-radius:8px;padding:12px;min-height:96px}
.stat .k{font-size:12px;color:var(--muted)}
.stat .v{font-size:23px;font-weight:780;margin:3px 0}
.stat .d{font-size:12px;color:var(--muted)}
.chart-wrap{height:430px;position:relative;border:1px solid var(--line);border-radius:8px;background:#fff}
.chart-wrap canvas{width:100%;height:100%;display:block}
.tooltip{
  position:absolute;z-index:4;display:none;pointer-events:none;min-width:148px;
  border:1px solid var(--line);background:rgba(255,255,255,.97);
  box-shadow:var(--shadow);border-radius:8px;padding:8px 10px;font-size:12px
}
.tooltip .muted{color:var(--muted)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;color:var(--muted);font-weight:650;background:#f3f6fb;border-bottom:1px solid var(--line);padding:9px 10px;white-space:nowrap}
td{padding:9px 10px;border-bottom:1px solid #edf1f7;white-space:nowrap}
tr:hover td{background:#fbfdff}
.sub{font-size:12px;color:var(--muted)}
.empty{padding:18px;border:1px dashed var(--line);border-radius:8px;background:var(--panel-soft);color:var(--muted);font-size:13px}
.notice{padding:12px 14px;border:1px solid #f3d08b;border-radius:8px;background:#fff8e6;color:#8a5a12;font-size:13px}
.text-danger{color:var(--red)}
.text-safe{color:var(--green)}
.text-info{color:var(--cyan)}
.tag{display:inline-block;min-width:50px;text-align:center;border-radius:6px;padding:3px 8px;font-weight:700;font-size:12px}
.tag.safe{background:#def7ec;color:var(--green)}
.tag.warning{background:#fff2d6;color:var(--amber)}
.tag.danger{background:#fee5e5;color:var(--red)}
.tag.info{background:#dff4fb;color:var(--cyan)}
.quality-row{display:grid;grid-template-columns:96px 74px minmax(0,1fr);gap:8px;align-items:start;border-bottom:1px solid #edf1f7;padding:9px 0;font-size:13px}
.quality-row>div{min-width:0;overflow-wrap:anywhere}
.inline-heading{font-size:13px;font-weight:750;margin:14px 0 4px}
.footer{color:var(--muted);font-size:12px;padding:4px 0 20px}
@media(max-width:1100px){.summary-grid{grid-template-columns:repeat(3,1fr)}.controls{grid-template-columns:1fr 1fr}.topbar{display:block}.meta{justify-content:flex-start;margin-top:12px}.two-col{grid-template-columns:1fr}}
@media(max-width:620px){.app{padding:20px 14px}.summary-grid{grid-template-columns:1fr}.controls{grid-template-columns:1fr}.chart-wrap{height:340px}}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="title">
      <h1>历史分时研究</h1>
      <p>从 SQLite 分时仓库读取宽基分钟线，观察连续趋势、反转次数和路径噪声。</p>
    </div>
    <div class="meta" id="metaChips"></div>
  </div>

  <div id="missingData" class="section"></div>

  <div class="section panel">
    <h2>研究范围</h2>
    <div class="controls">
      <div class="field">
        <label>指数</label>
        <select id="indexSelect" class="select"></select>
      </div>
      <div class="field">
        <label>开始日期</label>
        <input id="startDate" class="input" type="date">
      </div>
      <div class="field">
        <label>结束日期</label>
        <input id="endDate" class="input" type="date">
      </div>
      <button class="btn primary" id="applyBtn" type="button">应用</button>
      <button class="btn" id="allBtn" type="button">全区间</button>
    </div>
  </div>

  <div class="section" id="dataNotice"></div>

  <div class="section">
    <div class="summary-grid" id="statsGrid"></div>
  </div>

  <div class="section panel">
    <h3>连续分时趋势</h3>
    <div class="chart-wrap">
      <canvas id="trendCanvas"></canvas>
      <div class="tooltip" id="chartTooltip"></div>
    </div>
  </div>

  <div class="section two-col">
    <div class="panel">
      <h3>单日趋势拆解</h3>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>日期</th>
              <th>收益</th>
              <th>路径</th>
              <th>效率</th>
              <th>反转</th>
              <th>噪声</th>
            </tr>
          </thead>
          <tbody id="dayRows"></tbody>
        </table>
      </div>
    </div>
    <div class="panel">
      <h3>数据覆盖</h3>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>指数</th>
              <th>日期范围</th>
              <th>天数</th>
              <th>点数</th>
              <th>类型</th>
            </tr>
          </thead>
          <tbody id="coverageRows"></tbody>
        </table>
      </div>
      <div class="inline-heading">数据源健康状态</div>
      <div id="healthRows"></div>
    </div>
  </div>

  <div class="footer">
    指标口径：趋势效率 = |区间收益| / 路径长度；噪声率 = 100 - 趋势效率；反转次数忽略 0.02% 以内的微小跳动。
  </div>
</div>

<script src="data/cache/intraday_research_data.js"></script>
<script>
const data = window.INTRADAY_RESEARCH_DATA;
let currentPoints = [];
let currentStats = null;

function fmt(value, digits=1, suffix=''){
  return Number.isFinite(value) ? `${value.toFixed(digits)}${suffix}` : '-';
}
function retClass(value){
  if (!Number.isFinite(value)) return 'text-info';
  return value >= 0 ? 'text-danger' : 'text-safe';
}
function qualityTag(status){
  const map = { ok:'safe', partial:'warning', limited:'warning', cache:'warning', failed:'danger' };
  return `<span class="tag ${map[status] || 'info'}">${status}</span>`;
}
function escapeHtml(value){
  return String(value ?? '').replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
}
function renderMissing(){
  const box = document.getElementById('missingData');
  if (data) { box.innerHTML = ''; return; }
  box.innerHTML = '<div class="empty">未找到分时研究缓存。请先运行 tools/build_intraday_research.py。</div>';
}
function renderMeta(){
  document.getElementById('metaChips').innerHTML = [
    `版本 ${data.version}`,
    `生成 ${data.generated_at}`,
    `范围 ${data.coverage.min_date || '-'} 至 ${data.coverage.max_date || '-'}`,
    `指数 ${data.coverage.indices}`,
    `点数 ${data.coverage.loaded_rows}`,
    `<a href="strategy_dashboard.html">策略研究</a>`,
    `<a href="dashboard.html">收盘驾驶舱</a>`
  ].map(v => `<span class="chip">${v}</span>`).join('');
}
function initControls(){
  const select = document.getElementById('indexSelect');
  const ids = Object.keys(data.series || {});
  select.innerHTML = ids.map(id => {
    const row = data.series[id];
    return `<option value="${id}">${row.name} (${id})</option>`;
  }).join('');
  select.value = ids.includes('000300') ? '000300' : ids[0];
  const start = document.getElementById('startDate');
  const end = document.getElementById('endDate');
  start.min = data.coverage.min_date || '';
  start.max = data.coverage.max_date || '';
  end.min = data.coverage.min_date || '';
  end.max = data.coverage.max_date || '';
  start.value = data.coverage.min_date || '';
  end.value = data.coverage.max_date || '';
  document.getElementById('applyBtn').addEventListener('click', updateView);
  document.getElementById('allBtn').addEventListener('click', () => {
    start.value = data.coverage.min_date || '';
    end.value = data.coverage.max_date || '';
    updateView();
  });
  select.addEventListener('change', updateView);
}
function selectedPoints(){
  const id = document.getElementById('indexSelect').value;
  const start = document.getElementById('startDate').value;
  const end = document.getElementById('endDate').value;
  const row = data.series[id] || {points: []};
  return row.points
    .filter(p => (!start || p.d >= start) && (!end || p.d <= end) && Number.isFinite(Number(p.c)))
    .sort((a,b) => a.dt.localeCompare(b.dt));
}
function calcStats(points, includeDaily=true){
  if (points.length < 2) {
    return {points: points.length, days: 0, totalReturn: NaN, path: NaN, efficiency: NaN, reversals: 0, noise: NaN, realizedVol: NaN, daily: []};
  }
  const first = Number(points[0].c);
  const last = Number(points[points.length - 1].c);
  const moves = [];
  for (let i = 1; i < points.length; i++) {
    const prev = Number(points[i - 1].c);
    const curr = Number(points[i].c);
    if (prev > 0 && curr > 0) moves.push((curr / prev - 1) * 100);
  }
  const totalReturn = (last / first - 1) * 100;
  const path = moves.reduce((sum, v) => sum + Math.abs(v), 0);
  const efficiency = path > 0 ? Math.abs(totalReturn) / path * 100 : 0;
  const noise = Math.max(0, 100 - efficiency);
  const mean = moves.reduce((s,v)=>s+v,0) / Math.max(1, moves.length);
  const variance = moves.reduce((s,v)=>s+(v-mean)*(v-mean),0) / Math.max(1, moves.length);
  const realizedVol = Math.sqrt(variance) * Math.sqrt(moves.length);
  const reversals = countReversals(moves);
  const dates = [...new Set(points.map(p => p.d))];
  const daily = includeDaily ? dates.map(date => {
    const rows = points.filter(p => p.d === date);
    const stats = calcStats(rows, false);
    return {date, rows: rows.length, ...stats};
  }) : [];
  return {points: points.length, days: dates.length, totalReturn, path, efficiency, reversals, noise, realizedVol, daily};
}
function countReversals(moves){
  const threshold = 0.02;
  let last = 0;
  let count = 0;
  for (const move of moves) {
    const sign = move > threshold ? 1 : move < -threshold ? -1 : 0;
    if (!sign) continue;
    if (last && sign !== last) count += 1;
    last = sign;
  }
  return count;
}
function updateStats(){
  const stats = currentStats;
  document.getElementById('statsGrid').innerHTML = [
    ['区间收益', fmt(stats.totalReturn,2,'%'), '首点到末点', retClass(stats.totalReturn)],
    ['趋势效率', fmt(stats.efficiency,1,'%'), '越高越连贯', 'text-info'],
    ['路径长度', fmt(stats.path,2,'%'), '累计绝对波动', 'text-info'],
    ['反转次数', `${stats.reversals}`, '方向切换次数', 'text-info'],
    ['噪声率', fmt(stats.noise,1,'%'), '越高越来回拉扯', stats.noise >= 70 ? 'text-danger' : 'text-info'],
    ['实现波动', fmt(stats.realizedVol,2,'%'), '区间分钟波动', 'text-info'],
    ['样本', `${stats.days}天 / ${stats.points}点`, '当前筛选范围', 'text-info']
  ].map(([k,v,d,c]) => `
    <div class="stat">
      <div class="k">${k}</div>
      <div class="v ${c}">${v}</div>
      <div class="d">${d}</div>
    </div>
  `).join('');
}
function updateDailyRows(){
  document.getElementById('dayRows').innerHTML = currentStats.daily.map(row => `
    <tr>
      <td><strong>${row.date}</strong><div class="sub">${row.rows} 点</div></td>
      <td class="${retClass(row.totalReturn)}">${fmt(row.totalReturn,2,'%')}</td>
      <td>${fmt(row.path,2,'%')}</td>
      <td>${fmt(row.efficiency,1,'%')}</td>
      <td>${row.reversals}</td>
      <td>${fmt(row.noise,1,'%')}</td>
    </tr>
  `).join('');
}
function renderCoverage(){
  document.getElementById('coverageRows').innerHTML = data.indices.map(row => `
    <tr>
      <td><strong>${escapeHtml(row.index_name)}</strong><div class="sub">${row.index_id}</div></td>
      <td>${row.min_date || '-'} 至 ${row.max_date || '-'}</td>
      <td>${row.days || 0}</td>
      <td>${row.rows || 0}</td>
      <td>${row.price_unit || '-'}<div class="sub">${row.source || '-'}</div></td>
    </tr>
  `).join('');
  const rows = data.data_health || [];
  document.getElementById('healthRows').innerHTML = rows.length ? rows.map(row => {
    const complete = row.is_complete ? '完整' : '有缺口';
    const detail = `来源：${row.source}；最新：${row.latest_date || '-'}；频率：${row.frequency || '-'}；完整性：${complete}。${row.detail || ''}`;
    return `
      <div class="quality-row">
        <div><strong>${escapeHtml(row.indicator_name || '-')}</strong></div>
        <div>${qualityTag(row.status)}</div>
        <div>${escapeHtml(detail)}</div>
      </div>
    `;
  }).join('') : '<div class="empty">暂无数据源健康缓存。</div>';
}
function renderNotice(){
  const id = document.getElementById('indexSelect').value;
  const first = (data.series[id]?.points || [])[0];
  const truncated = data.coverage.truncated ? ' 当前缓存被截断，请用生成器限定更小日期区间。' : '';
  const unit = first?.unit || '-';
  const text = unit === 'normalized_100'
    ? `当前分时为归一化收益线，适合观察趋势连贯性、噪声和反转；原始 OHLC/成交额需要后续用 CSV 或数据接口补齐。${truncated}`
    : `当前分时为原始价格线。${truncated}`;
  document.getElementById('dataNotice').innerHTML = `<div class="notice">${text}</div>`;
}
function returnsForChart(points){
  if (!points.length) return [];
  const first = Number(points[0].c);
  return points.map(p => ({...p, ret: (Number(p.c) / first - 1) * 100}));
}
function drawChart(hoverIndex=null){
  const canvas = document.getElementById('trendCanvas');
  const tip = document.getElementById('chartTooltip');
  const box = canvas.parentElement;
  const ratio = window.devicePixelRatio || 1;
  const width = box.clientWidth || 900;
  const height = box.clientHeight || 430;
  canvas.width = width * ratio;
  canvas.height = height * ratio;
  const ctx = canvas.getContext('2d');
  ctx.setTransform(ratio,0,0,ratio,0,0);
  ctx.clearRect(0,0,width,height);
  const points = returnsForChart(currentPoints);
  const pad = {left:48,right:18,top:18,bottom:30};
  const plotW = width - pad.left - pad.right;
  const plotH = height - pad.top - pad.bottom;
  ctx.font = '12px sans-serif';
  ctx.fillStyle = '#667085';
  if (points.length < 2) {
    ctx.fillText('当前范围无足够分时数据', pad.left, height / 2);
    return;
  }
  const values = points.map(p => p.ret);
  let max = Math.max(...values, 0);
  let min = Math.min(...values, 0);
  const span = Math.max(0.2, max - min);
  max += span * 0.08;
  min -= span * 0.08;
  const x = i => pad.left + i / Math.max(1, points.length - 1) * plotW;
  const y = v => pad.top + (max - v) / (max - min || 1) * plotH;
  ctx.strokeStyle = '#d9e1ee';
  ctx.lineWidth = 1;
  for (const line of [0]) {
    ctx.beginPath();
    ctx.moveTo(pad.left, y(line));
    ctx.lineTo(width - pad.right, y(line));
    ctx.stroke();
    ctx.fillText('0%', 10, y(line) + 4);
  }
  let lastDate = points[0].d;
  ctx.fillText(lastDate.slice(5), pad.left, height - 8);
  points.forEach((p, i) => {
    if (p.d !== lastDate) {
      ctx.strokeStyle = '#edf1f7';
      ctx.beginPath();
      ctx.moveTo(x(i), pad.top);
      ctx.lineTo(x(i), height - pad.bottom);
      ctx.stroke();
      ctx.fillStyle = '#667085';
      ctx.fillText(p.d.slice(5), x(i) + 4, height - 8);
      lastDate = p.d;
    }
  });
  ctx.beginPath();
  points.forEach((p,i) => i ? ctx.lineTo(x(i), y(p.ret)) : ctx.moveTo(x(i), y(p.ret)));
  ctx.strokeStyle = currentStats.totalReturn >= 0 ? '#cf3f3f' : '#169b62';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.fillStyle = '#667085';
  ctx.fillText(`${max.toFixed(1)}%`, 8, pad.top + 4);
  ctx.fillText(`${min.toFixed(1)}%`, 8, height - pad.bottom);
  canvas._chartState = {points, x, y, width, height, pad, plotW};
  if (Number.isInteger(hoverIndex) && points[hoverIndex]) {
    const p = points[hoverIndex], px = x(hoverIndex), py = y(p.ret);
    ctx.setLineDash([3,3]);
    ctx.strokeStyle = '#98a2b3';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(px, pad.top); ctx.lineTo(px, height - pad.bottom); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(pad.left, py); ctx.lineTo(width - pad.right, py); ctx.stroke();
    ctx.setLineDash([]);
    ctx.beginPath(); ctx.arc(px, py, 4, 0, Math.PI * 2);
    ctx.fillStyle = currentStats.totalReturn >= 0 ? '#cf3f3f' : '#169b62';
    ctx.fill();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
    tip.innerHTML = `<strong>${escapeHtml(data.series[document.getElementById('indexSelect').value].name)}</strong><br><span class="muted">${p.dt}</span><br>区间涨跌 <strong class="${retClass(p.ret)}">${fmt(p.ret,2,'%')}</strong>`;
    tip.style.left = `${Math.max(8, Math.min(width - 168, px + 12))}px`;
    tip.style.top = `${Math.max(8, Math.min(height - 76, py - 56))}px`;
    tip.style.display = 'block';
  } else {
    tip.style.display = 'none';
  }
}
function bindChart(){
  const canvas = document.getElementById('trendCanvas');
  canvas.addEventListener('mousemove', event => {
    const state = canvas._chartState;
    if (!state) return;
    const rect = canvas.getBoundingClientRect();
    const cx = event.clientX - rect.left;
    const ratio = (cx - state.pad.left) / Math.max(1, state.plotW);
    const idx = Math.max(0, Math.min(state.points.length - 1, Math.round(ratio * (state.points.length - 1))));
    drawChart(idx);
  });
  canvas.addEventListener('mouseleave', () => drawChart());
  window.addEventListener('resize', () => drawChart());
}
function updateView(){
  currentPoints = selectedPoints();
  currentStats = calcStats(currentPoints);
  renderNotice();
  updateStats();
  updateDailyRows();
  drawChart();
}
function boot(){
  renderMissing();
  if (!data) return;
  renderMeta();
  initControls();
  renderCoverage();
  bindChart();
  updateView();
}
boot();
</script>
</body>
</html>
