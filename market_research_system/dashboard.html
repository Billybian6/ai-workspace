<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>市场投研驾驶舱</title>
<style>
:root{
  --bg:#f5f7fb;
  --panel:#ffffff;
  --panel-soft:#f9fbff;
  --text:#172033;
  --muted:#667085;
  --line:#d9e1ee;
  --blue:#2563eb;
  --cyan:#0891b2;
  --green:#169b62;
  --amber:#b7791f;
  --red:#cf3f3f;
  --purple:#7c3aed;
  --shadow:0 8px 24px rgba(16,24,40,.08);
}
*{box-sizing:border-box}
body{
  margin:0;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  line-height:1.5;overflow-x:hidden;
}
.app{width:100%;max-width:1500px;margin:0 auto;padding:20px;min-width:0}
.topbar{
  display:flex;align-items:flex-start;justify-content:space-between;gap:16px;
  padding:18px 0 16px;border-bottom:1px solid var(--line);margin-bottom:18px
}
.title{min-width:0}
.title h1{font-size:24px;margin:0 0 4px;font-weight:750;letter-spacing:0}
.title p{margin:0;color:var(--muted);font-size:13px}
.meta{display:flex;flex-wrap:wrap;gap:8px;justify-content:flex-end;min-width:0}
.chip{
  border:1px solid var(--line);background:var(--panel);border-radius:999px;
  padding:6px 10px;font-size:12px;color:var(--muted);max-width:100%;min-width:0;overflow-wrap:anywhere;word-break:break-word
}
.chip a{color:var(--blue);text-decoration:none}
.section{margin-bottom:18px}
.summary{
  display:grid;grid-template-columns:1.15fr .85fr;gap:16px;
}
@media(max-width:1000px){.summary,.two-col{grid-template-columns:1fr!important}.topbar{display:block}.meta{justify-content:flex-start;margin-top:12px}}
.panel{
  background:var(--panel);border:1px solid var(--line);border-radius:8px;
  box-shadow:var(--shadow);padding:16px;min-width:0
}
.panel h2,.panel h3{
  font-size:15px;margin:0 0 12px;font-weight:700;display:flex;align-items:center;gap:8px
}
.headline{font-size:20px;font-weight:750;margin-bottom:10px;overflow-wrap:anywhere;word-break:break-word}
.bullets{margin:0;padding-left:18px;color:var(--muted);font-size:13px}
.bullets li{margin:5px 0}
.state-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
@media(max-width:1100px){.state-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:620px){.state-grid{grid-template-columns:1fr}}
.state-card{
  border:1px solid var(--line);background:var(--panel-soft);border-radius:8px;padding:12px;min-height:116px
}
.state-card .name{font-size:12px;color:var(--muted)}
.state-card .score{font-size:26px;font-weight:780;margin:2px 0}
.state-card .detail{font-size:12px;color:var(--muted)}
.insight-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:12px}
@media(max-width:760px){.insight-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:520px){.insight-grid{grid-template-columns:1fr}}
.insight-stat{border-bottom:1px solid #edf1f7;padding:4px 0 9px}
.insight-stat .k{font-size:12px;color:var(--muted)}
.insight-stat .v{font-size:20px;font-weight:760;margin-top:2px}
.board-lists{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:12px}
@media(max-width:760px){.board-lists{grid-template-columns:1fr}}
.board-list-title{font-size:12px;color:var(--muted);margin-bottom:6px}
.board-row{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:10px;border-bottom:1px solid #edf1f7;padding:7px 0;font-size:13px}
.board-row:last-child{border-bottom:none}
.spread-row{display:grid;grid-template-columns:minmax(0,1.1fr) minmax(0,.8fr) minmax(0,.7fr);gap:10px;border-bottom:1px solid #edf1f7;padding:9px 0;font-size:13px}
.spread-row:last-child{border-bottom:none}
.divergence-row{border-left:3px solid var(--line);padding:8px 0 8px 10px;border-bottom:1px solid #edf1f7;font-size:13px;overflow-wrap:anywhere}
.divergence-row:last-child{border-bottom:none}
.divergence-row.danger{border-left-color:var(--red)}
.divergence-row.warning{border-left-color:var(--amber)}
.divergence-row.safe{border-left-color:var(--green)}
.inline-heading{font-size:13px;font-weight:750;margin:12px 0 4px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.three-col{display:grid;grid-template-columns:1.1fr 1fr .9fr;gap:16px}
@media(max-width:1200px){.three-col{grid-template-columns:1fr}}
.chart-box{height:280px;position:relative;border:1px solid var(--line);border-radius:8px;background:#fff}
.chart-box canvas{width:100%;height:100%;display:block}
.detail-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
@media(max-width:620px){.detail-grid{grid-template-columns:1fr}}
.metric-box{background:var(--panel-soft);border:1px solid var(--line);border-radius:8px;padding:10px}
.metric-box .k{font-size:12px;color:var(--muted)}
.metric-box .v{font-size:20px;font-weight:760;margin-top:2px}
.report-link{color:var(--blue);text-decoration:none;font-weight:650}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{
  text-align:left;color:var(--muted);font-weight:650;background:#f3f6fb;
  border-bottom:1px solid var(--line);padding:9px 10px;white-space:nowrap
}
td{padding:9px 10px;border-bottom:1px solid #edf1f7;vertical-align:middle;white-space:nowrap}
tr:hover td{background:#fbfdff}
.bar-track{width:120px;height:8px;border-radius:999px;background:#e8eef7;overflow:hidden}
.bar-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--cyan),var(--blue))}
.tag{
  display:inline-block;min-width:50px;text-align:center;border-radius:6px;padding:3px 8px;
  font-weight:700;font-size:12px
}
.tag.danger{background:#fee5e5;color:var(--red)}
.tag.warning{background:#fff2d6;color:var(--amber)}
.tag.safe{background:#def7ec;color:var(--green)}
.tag.info{background:#dff4fb;color:var(--cyan)}
.text-danger{color:var(--red)}
.text-warning{color:var(--amber)}
.text-safe{color:var(--green)}
.text-info{color:var(--cyan)}
.delta-up{color:var(--red);font-weight:700}
.delta-down{color:var(--green);font-weight:700}
.delta-flat{color:var(--muted)}
.sub{color:var(--muted);font-size:12px}
.controls{display:flex;gap:8px;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap}
.select{
  border:1px solid var(--line);background:#fff;border-radius:6px;color:var(--text);
  padding:7px 10px;font-size:13px;outline:none
}
.alert-row{
  display:grid;grid-template-columns:86px 96px minmax(0,1fr);gap:10px;align-items:start;
  border-bottom:1px solid #edf1f7;padding:10px 0;font-size:13px
}
.alert-row>div,.quality-row>div,.board-row>div,.spread-row>div{min-width:0;overflow-wrap:anywhere;word-break:break-word}
.alert-row:last-child{border-bottom:none}
.quality-row{
  display:grid;grid-template-columns:92px 70px minmax(0,1fr);gap:8px;align-items:start;
  border-bottom:1px solid #edf1f7;padding:9px 0;font-size:13px
}
.quality-row:last-child{border-bottom:none}
.empty{
  padding:20px;border:1px dashed var(--line);border-radius:8px;background:var(--panel-soft);
  color:var(--muted);font-size:13px
}
.notice{
  padding:12px 14px;border:1px solid #f3d08b;border-radius:8px;background:#fff8e6;
  color:#8a5a12;font-size:13px
}
.footer{color:var(--muted);font-size:12px;padding:4px 0 20px}
@media(max-width:620px){
  .app{padding:20px 14px}
  .headline{font-size:18px}
  .alert-row{grid-template-columns:48px 88px minmax(0,1fr);gap:8px}
  .quality-row{grid-template-columns:76px 58px minmax(0,1fr)}
  .spread-row{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="title">
      <h1>市场投研驾驶舱</h1>
      <p>多维度监控市场状态、风格轮动、行业热力和拥挤风险。</p>
    </div>
    <div class="meta" id="metaChips"></div>
  </div>

  <div id="missingData" class="section"></div>

  <div class="section summary">
    <div class="panel">
      <h2>今日投研摘要</h2>
      <div id="summaryPanel"></div>
    </div>
    <div class="panel">
      <h2>风险提示</h2>
      <div id="riskAlerts"></div>
    </div>
  </div>

  <div class="section">
    <div class="state-grid" id="marketState"></div>
  </div>

  <div class="section two-col">
    <div class="panel">
      <h3>市场宽度与扩散</h3>
      <div id="breadthPanel"></div>
    </div>
    <div class="panel">
      <h3>风格价差与背离</h3>
      <div id="styleSpreadRows"></div>
      <div class="inline-heading">背离信号</div>
      <div id="divergenceRows"></div>
    </div>
  </div>

  <div class="section two-col">
    <div class="panel">
      <div class="controls">
        <h3>宽基温度趋势</h3>
        <select id="trendSelect" class="select"></select>
      </div>
      <div class="chart-box"><canvas id="trendCanvas"></canvas></div>
    </div>
    <div class="panel">
      <h3>资产详情</h3>
      <div id="assetDetail"></div>
    </div>
  </div>

  <div class="section two-col">
    <div class="panel">
      <h3>风格轮动</h3>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>风格</th>
              <th>成员</th>
              <th>温度</th>
              <th>热度</th>
              <th>较前日</th>
              <th>区间变化</th>
            </tr>
          </thead>
          <tbody id="styleRows"></tbody>
        </table>
      </div>
    </div>
    <div class="panel">
      <h3>宽基指数监控</h3>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>指数</th>
              <th>风格</th>
              <th>分数</th>
              <th>较前日</th>
              <th>拥挤度</th>
              <th>换手分位</th>
            </tr>
          </thead>
          <tbody id="indexRows"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="section three-col">
    <div class="panel">
      <div class="controls">
        <h3>行业/主题热力</h3>
        <select id="industrySort" class="select">
          <option value="score">按热度</option>
          <option value="ret_5d">按涨跌</option>
          <option value="amount_pct">按成交分位</option>
          <option value="net_inflow">按主力净流入</option>
        </select>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>方向</th>
              <th>热度</th>
              <th>状态</th>
              <th>涨跌</th>
              <th>成交额</th>
              <th>主力净流入</th>
              <th>质量</th>
            </tr>
          </thead>
          <tbody id="industryRows"></tbody>
        </table>
      </div>
    </div>
    <div class="panel">
      <h3>信号矩阵</h3>
      <div id="signalMatrix"></div>
    </div>
    <div class="panel">
      <h3>数据源健康状态</h3>
      <div id="qualityRows"></div>
    </div>
  </div>

  <div class="footer">
    本页面为投研监控工具，不构成投资建议。若数据质量为 proxy/cache/mixed，结论应降权使用。
  </div>
</div>

<script src="data/cache/market_dashboard_data.js"></script>
<script>
const data = window.MARKET_DASHBOARD_DATA;

function cls(level){ return level?.class || 'info'; }
function tag(level){ return `<span class="tag ${cls(level)}">${level?.label || '-'}</span>`; }
function fmt(value, digits=1, suffix=''){
  return Number.isFinite(value) ? `${value.toFixed(digits)}${suffix}` : '-';
}
function signed(value, digits=1){
  if (!Number.isFinite(value)) return '-';
  if (Math.abs(value) < 0.05) return '<span class="delta-flat">0.0</span>';
  const c = value > 0 ? 'delta-up' : 'delta-down';
  const s = value > 0 ? '+' : '';
  return `<span class="${c}">${s}${value.toFixed(digits)}</span>`;
}
function bar(score){
  const width = Math.max(0, Math.min(100, Number(score) || 0));
  return `<div class="bar-track"><div class="bar-fill" style="width:${width}%"></div></div>`;
}
function qualityTag(status){
  const map = { ok:'safe', cache:'warning', proxy:'warning', mixed:'warning', fallback:'warning', partial:'warning', limited:'warning', failed:'danger' };
  return `<span class="tag ${map[status] || 'info'}">${status}</span>`;
}
function severityClass(value){
  const map = { '高':'danger', '中':'warning', '低':'safe' };
  return map[value] || 'info';
}
function severityTag(value){
  return `<span class="tag ${severityClass(value)}">${value}</span>`;
}

function renderMissing(){
  const box = document.getElementById('missingData');
  if (data) {
    const rawDate = data.source?.raw_latest_date;
    if (rawDate && rawDate !== data.trade_date) {
      box.innerHTML = `<div class="notice">原始基础库最新日期为 ${rawDate}，但宽基指数日频成交额尚未完整落库；当前收盘驾驶舱使用最近完整收盘日 ${data.trade_date}。行业/主题热力仍为本次生成时的实时数据。</div>`;
    } else {
      box.innerHTML = '';
    }
    return;
  }
  box.innerHTML = `<div class="empty">未找到缓存数据。请先运行 tools/build_market_dashboard.py 生成 data/cache/market_dashboard_data.js。</div>`;
}

function renderMeta(){
  document.getElementById('metaChips').innerHTML = [
    `版本 ${data.version}`,
    `交易日 ${data.trade_date}`,
    data.source?.raw_latest_date && data.source.raw_latest_date !== data.trade_date ? `原始最新 ${data.source.raw_latest_date}` : '',
    `生成 ${data.generated_at}`,
    `行业数据 ${data.source.industry_quality}`,
    data.report?.daily_markdown ? `日报 ${data.report.daily_markdown}` : '',
    data.history?.snapshot ? `快照 ${data.history.snapshot}` : '',
    `<a href="intraday_research.html">历史分时</a>`,
    `<a href="strategy_dashboard.html">策略研究</a>`,
    `<a href="morning_dashboard.html">午盘快照</a>`,
  ].filter(Boolean).map(v => `<span class="chip">${v}</span>`).join('');
}

function renderSummary(){
  document.getElementById('summaryPanel').innerHTML = `
    <div class="headline">${data.summary.headline}</div>
    <ul class="bullets">${data.summary.bullets.map(v => `<li>${v}</li>`).join('')}</ul>
  `;
}

function renderAlerts(){
  document.getElementById('riskAlerts').innerHTML = data.risk_alerts.map(row => `
    <div class="alert-row">
      <div>${severityTag(row.level)}</div>
      <div><strong>${row.target}</strong><div class="sub">${row.type}</div></div>
      <div>${row.message}</div>
    </div>
  `).join('');
}

function renderState(){
  document.getElementById('marketState').innerHTML = data.market_state.map(row => `
    <div class="state-card">
      <div class="name">${row.name}</div>
      <div class="score text-${cls(row.status)}">${fmt(row.score)}</div>
      <div>${tag(row.status)}</div>
      <div class="detail">${row.detail}</div>
    </div>
  `).join('');
}

function renderBreadth(){
  const b = data.market_breadth || {};
  const boardRows = rows => (rows || []).map(row => `
    <div class="board-row">
      <div><strong>${row.name}</strong><div class="sub">${row.state || '-'}</div></div>
      <div>${fmt(row.score)}<div class="sub">${fmt(row.ret_5d,2,'%')}</div></div>
    </div>
  `).join('') || '<div class="empty">暂无样本</div>';
  document.getElementById('breadthPanel').innerHTML = `
    <div class="insight-grid">
      <div class="insight-stat"><div class="k">扩散分</div><div class="v text-${cls(b.status)}">${fmt(b.diffusion_score)} ${tag(b.status)}</div></div>
      <div class="insight-stat"><div class="k">上涨覆盖</div><div class="v">${b.positive_count || 0}/${b.coverage || 0}</div><div class="sub">${fmt(b.positive_ratio,1,'%')}</div></div>
      <div class="insight-stat"><div class="k">热点数量</div><div class="v">${b.hot_count || 0}</div><div class="sub">低热 ${b.cold_count || 0}</div></div>
      <div class="insight-stat"><div class="k">主力净流入</div><div class="v">${fmt(b.total_net_inflow,2,'亿')}</div><div class="sub">覆盖 ${fmt(b.net_inflow_positive_ratio,1,'%')}</div></div>
    </div>
    <div class="insight-grid">
      <div class="insight-stat"><div class="k">头尾分化</div><div class="v">${fmt(b.dispersion_score)}</div></div>
      <div class="insight-stat"><div class="k">前五成交占比</div><div class="v">${fmt(b.top5_amount_share,1,'%')}</div></div>
      <div class="insight-stat"><div class="k">样本数</div><div class="v">${b.coverage || 0}</div></div>
      <div class="insight-stat"><div class="k">状态解释</div><div class="sub">${b.note || '-'}</div></div>
    </div>
    <div class="board-lists">
      <div><div class="board-list-title">高热方向</div>${boardRows(b.top_boards)}</div>
      <div><div class="board-list-title">低热方向</div>${boardRows(b.bottom_boards)}</div>
    </div>
  `;
}

function renderSpreadsAndDivergence(){
  const spreads = data.style_spreads || [];
  const divergences = data.divergence_signals || [];
  document.getElementById('styleSpreadRows').innerHTML = spreads.map(row => `
    <div class="spread-row">
      <div><strong>${row.name}</strong><div class="sub">${row.direction}</div></div>
      <div>${tag(row.status)}<div class="sub">温差 ${signed(row.value)}</div></div>
      <div><span class="sub">${fmt(row.long_score)} / ${fmt(row.short_score)}</span></div>
    </div>
  `).join('') || '<div class="empty">暂无风格价差</div>';
  document.getElementById('divergenceRows').innerHTML = divergences.map(row => `
    <div class="divergence-row ${severityClass(row.level)}">
      <div>${severityTag(row.level)} <strong>${row.title}</strong></div>
      <div class="sub">${row.type} · ${row.target}</div>
      <div>${row.message}</div>
    </div>
  `).join('') || '<div class="empty">暂无背离信号</div>';
}

function renderStyles(){
  document.getElementById('styleRows').innerHTML = data.style_rotation.map(row => `
    <tr>
      <td><strong>${row.name}</strong></td>
      <td><span class="sub">${row.members}</span></td>
      <td>${bar(row.score)}</td>
      <td>${tag(row.level)} ${fmt(row.score)}</td>
      <td>${signed(row.day_delta)}</td>
      <td>${signed(row.range_delta)}</td>
    </tr>
  `).join('');
}

function renderIndices(){
  document.getElementById('indexRows').innerHTML = data.wide_indices.map(row => `
    <tr>
      <td><strong>${row.name}</strong><div class="sub">${row.coverage}</div></td>
      <td>${row.group}</td>
      <td>${tag(row.level)} ${fmt(row.score)}</td>
      <td>${signed(row.day_delta)}</td>
      <td>${fmt(row.congestion,2,'%')}</td>
      <td>${fmt(row.percentile,0,'%')}</td>
    </tr>
  `).join('');
}

function renderTrendControls(){
  const select = document.getElementById('trendSelect');
  select.innerHTML = data.wide_indices.map(row => `<option value="${row.id}">${row.name}</option>`).join('');
  select.value = data.wide_indices[0]?.id || '';
  select.addEventListener('change', () => {
    drawTrend();
    renderAssetDetail();
  });
}

function selectedIndex(){
  const id = document.getElementById('trendSelect').value;
  return data.wide_indices.find(row => row.id === id) || data.wide_indices[0];
}

function drawTrend(){
  const asset = selectedIndex();
  const canvas = document.getElementById('trendCanvas');
  const box = canvas.parentElement;
  const ratio = window.devicePixelRatio || 1;
  const width = box.clientWidth || 640;
  const height = box.clientHeight || 280;
  canvas.width = width * ratio;
  canvas.height = height * ratio;
  const ctx = canvas.getContext('2d');
  ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
  ctx.clearRect(0, 0, width, height);
  const pad = { left: 42, right: 18, top: 20, bottom: 34 };
  const plotW = width - pad.left - pad.right;
  const plotH = height - pad.top - pad.bottom;
  const series = asset.series || [];
  const values = series.map(p => p.score);
  const max = Math.max(100, ...values);
  const min = Math.min(0, ...values);
  const y = value => pad.top + (max - value) / (max - min || 1) * plotH;
  const x = i => pad.left + (series.length === 1 ? 0 : i / (series.length - 1) * plotW);

  ctx.strokeStyle = '#d9e1ee';
  ctx.lineWidth = 1;
  [30,50,70].forEach(line => {
    ctx.beginPath();
    ctx.moveTo(pad.left, y(line));
    ctx.lineTo(width - pad.right, y(line));
    ctx.stroke();
    ctx.fillStyle = '#667085';
    ctx.font = '11px sans-serif';
    ctx.fillText(String(line), 8, y(line) + 4);
  });

  ctx.beginPath();
  series.forEach((p, i) => {
    if (i === 0) ctx.moveTo(x(i), y(p.score));
    else ctx.lineTo(x(i), y(p.score));
  });
  ctx.strokeStyle = '#2563eb';
  ctx.lineWidth = 2.5;
  ctx.stroke();

  series.forEach((p, i) => {
    ctx.beginPath();
    ctx.arc(x(i), y(p.score), i === series.length - 1 ? 4 : 2.5, 0, Math.PI * 2);
    ctx.fillStyle = i === series.length - 1 ? '#cf3f3f' : '#2563eb';
    ctx.fill();
  });

  ctx.fillStyle = '#172033';
  ctx.font = '13px sans-serif';
  ctx.fillText(`${asset.name} 综合温度`, pad.left, 16);
  ctx.fillStyle = '#667085';
  ctx.font = '11px sans-serif';
  if (series.length) {
    ctx.fillText(series[0].date.slice(5), pad.left, height - 10);
    ctx.fillText(series[series.length - 1].date.slice(5), width - pad.right - 34, height - 10);
  }
}

function renderAssetDetail(){
  const asset = selectedIndex();
  document.getElementById('assetDetail').innerHTML = `
    <div class="headline">${asset.name} ${tag(asset.level)} ${fmt(asset.score)}</div>
    <div class="detail-grid">
      <div class="metric-box"><div class="k">较前日</div><div class="v">${signed(asset.day_delta)}</div></div>
      <div class="metric-box"><div class="k">区间变化</div><div class="v">${signed(asset.range_delta)}</div></div>
      <div class="metric-box"><div class="k">拥挤度</div><div class="v">${fmt(asset.congestion,2,'%')}</div></div>
      <div class="metric-box"><div class="k">成交额占比</div><div class="v">${fmt(asset.turnover_ratio,2,'%')}</div></div>
      <div class="metric-box"><div class="k">换手率</div><div class="v">${fmt(asset.turnover_rate,2,'%')}</div></div>
      <div class="metric-box"><div class="k">换手分位</div><div class="v">${fmt(asset.percentile,0,'%')}</div></div>
    </div>
    <p class="sub">覆盖 ${asset.coverage}；当温度高位且边际继续升温时，追涨性价比下降，需结合价格动量和成交扩散确认。</p>
  `;
}

function renderIndustries(){
  const sortKey = document.getElementById('industrySort').value;
  const rows = [...data.industry_heatmap].sort((a,b) => (Number(b[sortKey]) || -999) - (Number(a[sortKey]) || -999));
  document.getElementById('industryRows').innerHTML = rows.map(row => `
    <tr>
      <td><strong>${row.name}</strong></td>
      <td>${bar(row.score)}<div class="sub">${fmt(row.score)}</div></td>
      <td>${row.state}</td>
      <td>${fmt(row.ret_5d,2,'%')}</td>
      <td>${fmt(row.amount,0,'亿')}</td>
      <td>${fmt(row.net_inflow,2,'亿')}</td>
      <td>${qualityTag(row.quality)}</td>
    </tr>
  `).join('');
}

function renderSignals(){
  const hot = data.wide_indices.filter(row => row.score >= 70);
  const warming = data.wide_indices.filter(row => row.day_delta > 2);
  const cooling = data.wide_indices.filter(row => row.day_delta < -2);
  const low = data.wide_indices.filter(row => row.score < 30);
  const groups = [
    ['高拥挤', hot],
    ['边际升温', warming],
    ['边际降温', cooling],
    ['低位观察', low],
  ];
  document.getElementById('signalMatrix').innerHTML = groups.map(([name, rows]) => `
    <div class="quality-row">
      <div><strong>${name}</strong></div>
      <div>${rows.length}</div>
      <div>${rows.length ? rows.map(r => r.name).join('、') : '暂无'}</div>
    </div>
  `).join('');
}

function renderQuality(){
  const rows = data.data_health?.length ? data.data_health : data.data_quality;
  document.getElementById('qualityRows').innerHTML = rows.map(row => {
    const name = row.indicator_name || row.item || '-';
    const complete = row.source ? (row.is_complete ? '完整' : '有缺口') : '';
    const detail = row.source
      ? `来源：${row.source}；最新：${row.latest_date || '-'}；频率：${row.frequency || '-'}；完整性：${complete}。${row.detail || ''}`
      : row.detail;
    return `
    <div class="quality-row">
      <div><strong>${name}</strong></div>
      <div>${qualityTag(row.status)}</div>
      <div>${detail}</div>
    </div>
  `}).join('');
}

function boot(){
  renderMissing();
  if (!data) return;
  renderMeta();
  renderSummary();
  renderAlerts();
  renderState();
  renderBreadth();
  renderSpreadsAndDivergence();
  renderTrendControls();
  drawTrend();
  renderAssetDetail();
  renderStyles();
  renderIndices();
  renderIndustries();
  renderSignals();
  renderQuality();
  document.getElementById('industrySort').addEventListener('change', renderIndustries);
  window.addEventListener('resize', drawTrend);
}
boot();
</script>
</body>
</html>
